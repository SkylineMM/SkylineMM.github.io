<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Motion Media</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <!-- NAVBAR -->
    <nav>
    <div class="logo-title">
        <img src="images/Logo(dark).png" class="logo-img" alt="Logo">
        <div class="logo">Skyline Motion Media</div>
    </div>

        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>


    <!-- CONTACT -->
    <section id="contact" class="section section-animate">
        <h2>Get A Quote</h2>

        <form class="contact-form" action="https://formsubmit.co/skylinemotionmedia@gmail.com" method="POST">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">

            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>
        </form>


    </section>

    <footer>
        <p>© Skyline Motion Media — Professional UAV Imagery</p>
    </footer>






<script src="script.js"></script>



</body>
</html>
